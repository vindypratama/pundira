name: CI/CD Pundira

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "25.9"

jobs:
  # ──────────────────────────────────────────
  # Job 1: Lint & Type Check
  # ──────────────────────────────────────────
  lint:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

  # ──────────────────────────────────────────
  # Job 2: Build & Test
  # ──────────────────────────────────────────
  build:
    name: 🏗️ Build & Test
    runs-on: ubuntu-24.04
    needs: lint
    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pundira
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Push database schema
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pundira

      - name: Seed database
        run: npx tsx prisma/seed.ts
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pundira

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pundira
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}

      - name: Prepare deploy artifact
        run: |
          mkdir -p deploy
          cp -r .next/standalone deploy/.next-standalone
          cp -r .next/static deploy/.next-standalone/.next/static
          cp -r public deploy/.next-standalone/public
          cp -r prisma deploy/.next-standalone/prisma
          cp package-lock.json deploy/.next-standalone/
          cd deploy && tar -czf deploy.tar.gz .next-standalone

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-artifact
          path: deploy/deploy.tar.gz
          retention-days: 3

  # ──────────────────────────────────────────
  # Job 3: Deploy via SSH (hanya main branch)
  # ──────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to VPS
    runs-on: ubuntu-24.04
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Download deploy artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-artifact

      - name: Upload artifact to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: deploy.tar.gz
          target: /tmp/pundira-deploy

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 15m
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e

            APP_DIR="$HOME/pundira"
            DEPLOY_TMP="/tmp/pundira-deploy"

            echo "📦 Extracting deploy artifact..."
            mkdir -p $APP_DIR
            cd $DEPLOY_TMP
            tar -xzf deploy.tar.gz
            rsync -a --delete .next-standalone/ $APP_DIR/
            rm -rf $DEPLOY_TMP

            echo "📦 Installing production dependencies..."
            cd $APP_DIR
            npm ci --omit=dev

            echo "🗃️ Running database migrations..."
            npx prisma migrate deploy

            echo "🔄 Restarting application..."
            pm2 restart pundira || pm2 start node --name "pundira" -- server.js

            echo "✅ Deploy berhasil!"
